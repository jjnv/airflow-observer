services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env} -d ${POSTGRES_DB:?Set POSTGRES_DB in .env}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DEMO_MODE: ${DEMO_MODE:-false}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:?Set DEFAULT_WORKSPACE_ID in .env}
      DEFAULT_API_KEY: ${DEFAULT_API_KEY:?Set DEFAULT_API_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    environment:
      OBSERVER_API_URL: ${OBSERVER_API_URL_INTERNAL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  agent:
    build:
      context: ./agent
    environment:
      AIRFLOW_URL: ${AIRFLOW_URL:?Set AIRFLOW_URL in .env}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-}
      AIRFLOW_TOKEN: ${AIRFLOW_TOKEN:-}
      OBSERVER_API_URL: ${OBSERVER_API_URL_INTERNAL:-http://backend:8000}
      OBSERVER_API_KEY: ${OBSERVER_API_KEY:?Set OBSERVER_API_KEY in .env}
      WORKSPACE_ID: ${WORKSPACE_ID:?Set WORKSPACE_ID in .env}
      AIRFLOW_INSTANCE_UID: ${AIRFLOW_INSTANCE_UID:?Set AIRFLOW_INSTANCE_UID in .env}
      AIRFLOW_INSTANCE_NAME: ${AIRFLOW_INSTANCE_NAME:?Set AIRFLOW_INSTANCE_NAME in .env}
      AGENT_VERSION: ${AGENT_VERSION:-0.1.0}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      DAG_FILTER_REGEX: ${DAG_FILTER_REGEX:-.*}
      DAG_LIMIT: ${DAG_LIMIT:-100}
      RUN_LIMIT: ${RUN_LIMIT:-10}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
